<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBot — Sblocca orari</title>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10679317' data-sdk='show_10679317'></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            gap: 20px;
        }

        header {
            text-align: center;
            padding-top: 12px;
        }

        header .icon {
            font-size: 40px;
        }

        header h1 {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 8px;
        }

        header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

        /* Countdown ring */
        .countdown-wrap {
            position: relative;
            width: 110px;
            height: 110px;
        }

        .countdown-wrap svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        circle.track {
            fill: none;
            stroke: #222;
            stroke-width: 8;
        }

        circle.fill {
            fill: none;
            stroke: #4af;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .countdown-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }

        /* Status label */
        #status {
            font-size: 0.9rem;
            color: #4af;
            text-align: center;
            min-height: 1.2em;
        }

        /* The Monetag ad zone placeholder */
        #ad-zone {
            width: 100%;
            max-width: 360px;
            min-height: 100px;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a2e;
        }

        .done-check {
            font-size: 3rem;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="icon">🚌</div>
        <h1>Sblocca gli orari</h1>
        <p>Aspetta il countdown per sbloccare l'orario esatto</p>
    </header>

    <div class="countdown-wrap" id="ring-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
            <circle class="track" cx="55" cy="55" r="45" />
            <circle class="fill" id="ring" cx="55" cy="55" r="45" />
        </svg>
        <div class="countdown-num" id="num">15</div>
    </div>

    <p id="status">Caricamento annuncio...</p>

    <!-- Monetag ad renders here -->
    <div id="ad-zone"></div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const TOTAL = 15; // secondi di attesa
        let remaining = TOTAL;
        let timerStarted = false;
        const ring = document.getElementById('ring');
        const numEl = document.getElementById('num');
        const status = document.getElementById('status');
        const ringWrap = document.getElementById('ring-wrap');
        const circumference = 2 * Math.PI * 45; // ≈ 282.7

        ring.style.strokeDasharray = circumference;
        ring.style.strokeDashoffset = 0;

        function startCountdown() {
            if (timerStarted) return;
            timerStarted = true;
            status.textContent = 'Guarda lo spot e aspetta…';

            const interval = setInterval(() => {
                remaining--;
                numEl.textContent = remaining;

                const progress = remaining / TOTAL;
                ring.style.strokeDashoffset = circumference * (1 - progress);
                if (progress < 0.33) ring.style.stroke = '#f84';
                else if (progress < 0.66) ring.style.stroke = '#fa4';

                if (remaining <= 0) {
                    clearInterval(interval);
                    unlock();
                }
            }, 1000);
        }

        function unlock() {
            ringWrap.innerHTML = '<div class="done-check">✅</div>';
            status.textContent = 'Orari sbloccati! Torna su Telegram.';
            try { Telegram.WebApp.sendData('ad_reward'); } catch (_) { }
            setTimeout(() => Telegram.WebApp.close(), 1200);
        }

        // Avvia Monetag In-app Interstitial + countdown
        function initAd(attempts) {
            if (typeof show_10679317 === 'function') {
                status.textContent = 'Annuncio pronto!';
                // In-app Interstitial: mostra banner inline, no redirect
                show_10679317({
                    type: 'inApp',
                    inAppSettings: {
                        frequency: 1,   // mostra 1 annuncio
                        capping: 1,     // per 1 ora
                        interval: 0,
                        timeout: 1,     // appare dopo 1 secondo
                        everyPage: false
                    }
                });
                // Avvia il countdown indipendentemente dall'ad
                setTimeout(startCountdown, 1500);
            } else if (attempts > 0) {
                setTimeout(() => initAd(attempts - 1), 300);
            } else {
                // SDK non caricato: avvia solo il countdown
                status.textContent = 'Aspetta il countdown…';
                startCountdown();
            }
        }

        window.addEventListener('load', () => initAd(15));
    </script>
</body>

</html>
